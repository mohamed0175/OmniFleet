# -----------------------------------------------------------------------------
# Server
#   CPU   : 4 Cores
#   RAM   : 9.7 GB (~9 GB usable)
#   SSD   : /data/ssd
#   HDD   : /data/hdd
#   SWAP  : 4 GB
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Common Templates
# -----------------------------------------------------------------------------

x-common-env: &common-env
  env_file: .env
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# -----------------------------------------------------------------------------
# Security Templates
# -----------------------------------------------------------------------------

x-hardened: &hardened
  security_opt:
    - no-new-privileges:true

x-cap-drop-all: &cap-drop-all
  cap_drop:
    - ALL

x-cap-drop-standard: &cap-drop-standard
  cap_drop:
    - SYS_ADMIN
    - SYS_PTRACE

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------

networks:
  backend:
    name: omnifleet-backend
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  frontend:
    name: omnifleet-frontend
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # Core Layer (Always runs)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    container_name: omnifleet-postgres
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
        -c max_connections=40
        -c shared_buffers=192MB
        -c effective_cache_size=576MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=6MB
        -c log_min_duration_statement=500
    volumes:
      - /data/ssd/postgres:/var/lib/postgresql/data
      - /opt/omnifleet/init/postgres:/docker-entrypoint-initdb.d:ro
      - /data/hdd/backup/postgres:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 768m
    mem_reservation: 384m
    cpus: "0.8"
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: omnifleet-pgadmin
    <<: [ *common-env, *default-logging ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_DISABLE_POSTFIX: "True"
      SCRIPT_NAME: "/pgadmin"
    ports:
      - "5050:80"
    volumes:
      - /data/hdd/pgadmin:/var/lib/pgadmin
      - /data/hdd/pgadmin/log:/var/log/pgadmin
    tmpfs:
      - /tmp:mode=1777
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.2"
    networks:
      - backend
      - frontend

  minio:
    image: quay.io/minio/minio:latest
    container_name: omnifleet-minio
    hostname: minio
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-all ]
    user: "1000:1000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DISK_USAGE_CRAWL_DELAY: 72h
      MINIO_BROWSER: "on"
      MINIO_BROWSER_REDIRECT_URL: "https://ubuntu-server.tail712639.ts.net/minio/"
    command: server /data --console-address ":9001"
    volumes:
      - /data/hdd/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 384m
    mem_reservation: 128m
    cpus: "0.4"
    networks:
      - backend
      - frontend

  mc-init:
    image: quay.io/minio/mc:latest
    container_name: omnifleet-mc-init
    restart: on-failure
    <<: *common-env
    user: "1000:1000"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      RAW_BUCKET: ${RAW_BUCKET}
      BRONZE_BUCKET: ${BRONZE_BUCKET}
      SILVER_BUCKET: ${SILVER_BUCKET}
      GOLD_BUCKET: ${GOLD_BUCKET}
      CHECKPOINT_BUCKET: ${CHECKPOINT_BUCKET}
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
      MC_CONFIG_DIR: /tmp/.mc
    volumes:
      - /opt/omnifleet/init/minio:/scripts:ro
    entrypoint: /bin/sh
    command: /scripts/init-buckets.sh
    mem_limit: 128m
    mem_reservation: 32m
    cpus: "0.1"
    networks:
      - backend
      
  caddy:
    image: caddy:2-alpine
    container_name: omnifleet-caddy
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"    
    volumes:
      - /opt/omnifleet/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/omnifleet/caddy/certs:/certs:ro
      - /data/hdd/caddy/data:/data
      - /data/hdd/caddy/config:/config
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 64m
    mem_reservation: 32m
    cpus: "0.1"
    networks:
      - frontend
      - backend

  # ---------------------------------------------------------------------------
  # Streaming
  # ---------------------------------------------------------------------------

  kafka:
    image: confluentinc/cp-kafka:8.1.0
    container_name: omnifleet-kafka
    hostname: kafka
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    profiles:
      - streaming
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx768m"
      KAFKA_MESSAGE_MAX_BYTES: 2097152
      KAFKA_REPLICA_FETCH_MAX_BYTES: 2097152
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 2097152
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 268435456
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - /data/ssd/kafka:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 > /dev/null 2>&1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    mem_limit: 900m
    mem_reservation: 512m
    cpus: "0.8"
    networks:
      - backend

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: omnifleet-schema-registry
    hostname: schema-registry
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    profiles:
      - streaming
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8181
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms128m -Xmx384m"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_KAFKASTORE_COMPATIBILITY_LEVEL: BACKWARD
    ports:
      - "8181:8181"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8181/subjects >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    mem_limit: 450m
    mem_reservation: 256m
    cpus: "0.3"
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: omnifleet-kafka-ui
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    profiles:
      - streaming
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_METRICS_PORT: ""
      SERVER_SERVLET_CONTEXT_PATH: "/kafka"
    ports:
      - "8090:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/kafka/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.2"
    networks:
      - backend
      - frontend

  # ---------------------------------------------------------------------------
  # Processing
  # ---------------------------------------------------------------------------

  spark-master:
    image: bitnami/spark:3.5.2
    container_name: omnifleet-spark-master
    hostname: spark-master
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "1001:0"
    profiles:
      - processing
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_LOCAL_DIRS: /opt/bitnami/spark/tmp
      SPARK_LOG_LEVEL: ERROR    
      SPARK_NO_DAEMONIZE: "true"
      SPARK_PUBLIC_DNS: https://ubuntu-server.tail712639.ts.net/
    init: true
    volumes:
      - /data/ssd/spark/checkpoints:/opt/spark/checkpoints
      - /data/ssd/spark/tmp:/opt/bitnami/spark/tmp
      - /opt/omnifleet/jobs:/opt/jobs:ro
      - /data/ssd/spark/events:/tmp/spark-events
      - /opt/omnifleet/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - /opt/omnifleet/spark/log4j2.properties:/opt/bitnami/spark/conf/log4j2.properties:ro
    ports:
      - "7077:7077"
      - "8082:8080"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; s=socket.socket(socket.AF_INET6); s.settimeout(5); s.connect(('::1', 8080)); s.close()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.3"
    networks:
      - backend

  spark-worker:
    image: bitnami/spark:3.5.2
    container_name: omnifleet-spark-worker
    hostname: spark-worker
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "1001:0"
    profiles:
      - processing
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_LOCAL_DIRS: /opt/bitnami/spark/tmp
      SPARK_WORKER_DIR: /tmp/spark-work
      SPARK_LOG_LEVEL: ERROR
      SPARK_NO_DAEMONIZE: "true"
      SPARK_PUBLIC_DNS: https://ubuntu-server.tail712639.ts.net/
    init: true
    volumes:
      - /data/ssd/spark/checkpoints:/opt/spark/checkpoints
      - /opt/omnifleet/jobs:/opt/jobs:ro
      - /data/ssd/spark/tmp:/opt/bitnami/spark/tmp
      - /data/ssd/spark/work:/tmp/spark-work
      - /opt/omnifleet/jars:/opt/bitnami/spark/jars-extra:ro
      - /data/ssd/spark/events:/tmp/spark-events
      - /opt/omnifleet/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - /opt/omnifleet/spark/log4j2.properties:/opt/bitnami/spark/conf/log4j2.properties:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; s=socket.socket(socket.AF_INET6); s.settimeout(5); s.connect(('::1', 8081)); s.close()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 2300m
    mem_reservation: 1300m
    cpus: "2.0"
    networks:
      - backend

  jupyter:
    image: omnifleet-jupyter:3.11
    container_name: omnifleet-jupyter
    hostname: jupyter
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "1001:0"
    profiles:
      - processing
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      JUPYTER_TOKEN:              ${JUPYTER_TOKEN}
      BASE_URL:                   /jupyter/
      JUPYTER_ARGS:               ""
      SPARK_DRIVER_MEMORY:        800m
      SPARK_EXECUTOR_INSTANCES:   1
      SPARK_EXECUTOR_CORES:       2
      SPARK_EXECUTOR_MEMORY:      1000m
      SPARK_LOCAL_IP:             jupyter
      SPARK_MASTER:               spark://spark-master:7077
      SPARK_LOCAL_DIRS:           /tmp/spark-local
      MINIO_ENDPOINT:             ${MINIO_ENDPOINT}
      MINIO_ROOT_USER:            ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD:        ${MINIO_ROOT_PASSWORD}
      POSTGRES_HOST:              ${POSTGRES_HOST}
      POSTGRES_PORT:              ${POSTGRES_PORT}
      POSTGRES_DB:                ${POSTGRES_DB}
      POSTGRES_USER:              ${POSTGRES_USER}
      POSTGRES_PASSWORD:          ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS:    kafka:29092
      SCHEMA_REGISTRY_URL:        https://ubuntu-server.tail712639.ts.net/schema-registry/
    init: true
    volumes:
      - /opt/omnifleet/spark/start-jupyter.sh:/usr/local/bin/start-jupyter.sh:ro
      - /opt/omnifleet/notebooks:/home/jovyan/work
      - /opt/omnifleet/jobs:/home/jovyan/jobs:ro
      - /opt/omnifleet/jars:/opt/spark/jars-extra:ro
      - /data/ssd/spark/checkpoints:/opt/spark/checkpoints
      - /opt/omnifleet/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - /opt/omnifleet/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - /data/ssd/spark/events:/tmp/spark-events
    ports:
      - "8888:8888"
      - "4040-4050:4040-4050"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8888/jupyter/api >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 2500m
    mem_reservation: 1200m
    cpus: "1.5"
    networks:
      - backend
      - frontend

  # ---------------------------------------------------------------------------
  # Data Modeling
  # ---------------------------------------------------------------------------

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    container_name: omnifleet-dbt
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    profiles:
      - modeling
    working_dir: /usr/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBT_USER: ${DBT_USER}
      DBT_PASSWORD: ${DBT_PASSWORD}
      DBT_HOST: postgres
      DBT_SCHEMA: analytics
    entrypoint: [ "sleep" ]
    command: [ "infinity" ]
    volumes:
      - /opt/omnifleet/dbt:/usr/app
      - /data/hdd/backup/dbt:/usr/app/logs
      - /data/hdd/dbt/target:/usr/app/target
      - /data/hdd/dbt/packages:/usr/app/dbt_packages
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.3"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Analytics
  # ---------------------------------------------------------------------------

  grafana:
    image: grafana/grafana:11.1.0
    container_name: omnifleet-grafana
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "472"
    profiles:
      - analytics
      - streaming
    depends_on:
      postgres:
        condition: service_healthy
      redis:                           
        condition: service_healthy 
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_PANELS_DISABLE_SANITIZE_HTML: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_REMOTE_CACHE_TYPE: "redis"
      GF_REMOTE_CACHE_CONNSTR: "addr=redis:6379,pool_size=100,db=0,ssl=false"
    volumes:
      - /data/hdd/grafana:/var/lib/grafana
      - /opt/omnifleet/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.2"
    networks:
      - backend
      - frontend

  superset:
    image: omnifleet-superset:4.1.1
    container_name: omnifleet-superset
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "10001:0"
    profiles:
      - analytics
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_WEBSERVER_WORKERS: 2
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SQLALCHEMY_DATABASE_URI: "postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}"
    entrypoint: /bin/sh
    command: /app/init-superset.sh
    init: true
    volumes:
      - /data/hdd/superset:/app/superset_home
      - /opt/omnifleet/init/superset/init-superset.sh:/app/init-superset.sh:ro
      - /opt/omnifleet/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    ports:
      - "8088:8088"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: 768m
    mem_reservation: 512m
    cpus: "0.5"
    networks:
      - backend
      - frontend

      
  redis:
    image: redis:7-alpine
    container_name: omnifleet-redis
    profiles:
      - streaming
      - analytics
    command: >
      redis-server
        --save ""
        --appendonly no
        --maxmemory 200mb
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 60
        --timeout 300
    restart: unless-stopped
    mem_limit:        256m
    mem_reservation:  128m
    cpus:             "0.2"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout:  5s
      retries:  3

  # ---------------------------------------------------------------------------
  # Workflow Orchestration
  # ---------------------------------------------------------------------------

  airflow-init:
    image: apache/airflow:2.10.2-python3.11
    container_name: omnifleet-airflow-init
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "${AIRFLOW_UID:-50000}:0"
    profiles:
      - orchestration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >- 
        postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username ${AIRFLOW_ADMIN_USERNAME} \
      --password ${AIRFLOW_ADMIN_PASSWORD} \
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
      --lastname ${AIRFLOW_ADMIN_LASTNAME} \
      --role Admin \
      --email ${AIRFLOW_ADMIN_EMAIL} || true"
    volumes:
      - /opt/omnifleet/airflow/dags:/opt/airflow/dags
      - /opt/omnifleet/airflow/plugins:/opt/airflow/plugins
      - /data/ssd/airflow/logs:/opt/airflow/logs
    restart: "no"
    mem_limit: 512m
