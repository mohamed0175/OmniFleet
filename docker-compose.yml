  airflow-webserver:
    image: apache/airflow:2.10.2-python3.11
    container_name: omnifleet-airflow-webserver
    <<: [ *common-env, *default-logging, *hardened, *cap-drop-standard ]
    user: "${AIRFLOW_UID:-50000}:0"
    profiles:
      - orchestration
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >- 
        postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: "https://ubuntu-server.tail712639.ts.net/airflow"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__WEBSERVER__WORKERS: 2
      AIRFLOW__CORE__PARALLELISM: 4
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 2
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - /opt/omnifleet/airflow/dags:/opt/airflow/dags
      - /opt/omnifleet/airflow/plugins:/opt/airflow/plugins
      - /data/ssd/airflow/logs:/opt/airflow/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/airflow/health').read()\" || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: 1000m
    mem_reservation: 700m
    cpus: "0.60"
    networks:
      - backend
      - frontend


